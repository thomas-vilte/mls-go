name: Build interop images

# Builds the mlspp and openmls interop client images and publishes them to
# GHCR, so the interop workflow pulls them in ~1 min instead of compiling
# them from scratch (~30 min for mlspp).
#
# Triggers:
#   - when the Dockerfiles (or the OpenMLS patch) change
#   - weekly, because the Dockerfiles clone upstream mlspp/openmls at build
#     time — a periodic rebuild keeps the images tracking upstream
#   - manually via workflow_dispatch
on:
  push:
    branches: [main, dev]
    paths:
      - "docker/Dockerfile.mlspp"
      - "docker/Dockerfile.openmls"
      - "docker/openmls-interop-client-wire-format.patch"
      - ".github/workflows/build-interop-images.yml"
  schedule:
    - cron: "0 3 * * 1" # weekly on Monday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mlspp
            dockerfile: docker/Dockerfile.mlspp
            image: ghcr.io/thomas-vilte/mls-go/mlspp-interop
          - name: openmls
            dockerfile: docker/Dockerfile.openmls
            image: ghcr.io/thomas-vilte/mls-go/openmls-interop
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=image-${{ matrix.name }}
          cache-to: type=gha,scope=image-${{ matrix.name }},mode=max
